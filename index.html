<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#FBF9F4"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0E0D0B"
      media="(prefers-color-scheme: dark)"
    />
    <title>Aatiq— Curated Antiques, Coins &amp; Vintage Jewelry</title>
    <meta
      name="description"
      content="A private gallery of museum-quality antiques, rare coins, and vintage jewelry. Curated by Aatiq for the discerning collector."
    />
    <meta property="og:url" content="https://aatiq.com" />
    <meta name="author" content="Aatiq" />

    <meta property="og:type" content="website" />

    <meta property="og:image" content="/og-image.jpg" />
    <!-- <link rel="icon" type="image/png" href="/favicon.png" /> -->
    <meta name="twitter:card" content="summary_large_image" />

    <script>
      // Set theme before paint to avoid flash
      try {
        var t = localStorage.getItem("theme");
        if (
          t === "dark" ||
          (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <meta
      property="og:title"
      content="Aatiq — Curated Antiques, Coins &amp; Vintage Jewelry"
    />
    <meta
      name="twitter:title"
      content="Aatiq — Curated Antiques, Coins &amp; Vintage Jewelry"
    />
    <meta
      property="og:description"
      content="A private gallery of museum-quality antiques, rare coins, and vintage jewelry. Curated by Aatiq for the discerning collector."
    />
    <meta
      name="twitter:description"
      content="A private gallery of museum-quality antiques, rare coins, and vintage jewelry. Curated by Aatiq for the discerning collector."
    />
    <meta name="twitter:image" content="/og-image.jpg" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
